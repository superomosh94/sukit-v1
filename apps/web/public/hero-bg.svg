<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="brandLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="brandDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#60A5FA" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- ===== LIGHT MODE ===== -->
  <g class="light-visible">
    <!-- Gradient washes -->
    <ellipse cx="200" cy="200" rx="450" ry="280" fill="url(#brandLight)" />
    <ellipse cx="1400" cy="650" rx="400" ry="250" fill="url(#brandLight)" />
    <ellipse cx="800" cy="450" rx="300" ry="350" fill="url(#brandLight)" opacity="0.4" />

    <!-- Grid lines -->
    <g stroke="#4F46E5" stroke-opacity="0.08" stroke-width="1">
      <line x1="0" y1="100" x2="1600" y2="100" /><line x1="0" y1="200" x2="1600" y2="200" />
      <line x1="0" y1="300" x2="1600" y2="300" /><line x1="0" y1="400" x2="1600" y2="400" />
      <line x1="0" y1="500" x2="1600" y2="500" /><line x1="0" y1="600" x2="1600" y2="600" />
      <line x1="0" y1="700" x2="1600" y2="700" /><line x1="0" y1="800" x2="1600" y2="800" />
      <line x1="200" y1="0" x2="200" y2="900" /><line x1="400" y1="0" x2="400" y2="900" />
      <line x1="600" y1="0" x2="600" y2="900" /><line x1="800" y1="0" x2="800" y2="900" />
      <line x1="1000" y1="0" x2="1000" y2="900" /><line x1="1200" y1="0" x2="1200" y2="900" />
      <line x1="1400" y1="0" x2="1400" y2="900" />
    </g>

    <!-- Code lines -->
    <g stroke="#4F46E5" stroke-opacity="0.1" stroke-width="1.5" fill="none">
      <path d="M60 280 L200 280 L220 240 L260 260 L300 200 L320 220 L380 180" />
      <path d="M1220 620 L1340 620 L1360 580 L1400 600 L1440 540" />
      <path d="M60 680 L160 680 L180 640 L220 660 L260 600" />
      <path d="M1260 240 L1380 240 L1400 200 L1440 220 L1480 160" />
    </g>

    <!-- Dots -->
    <g fill="#4F46E5" fill-opacity="0.12">
      <circle cx="150" cy="150" r="3" /><circle cx="350" cy="250" r="2" />
      <circle cx="550" cy="180" r="2.5" /><circle cx="750" cy="300" r="2" />
      <circle cx="950" cy="200" r="3" /><circle cx="1150" cy="280" r="2" />
      <circle cx="1350" cy="160" r="2.5" /><circle cx="1450" cy="350" r="2" />
      <circle cx="250" cy="450" r="2" /><circle cx="450" cy="550" r="2.5" />
      <circle cx="650" cy="400" r="2" /><circle cx="850" cy="500" r="3" />
      <circle cx="1050" cy="420" r="2" /><circle cx="1250" cy="550" r="2.5" />
      <circle cx="1450" cy="480" r="2" />
    </g>
  </g>

  <!-- ===== DARK MODE ===== -->
  <g class="dark-visible" style="display: none;">
    <style>
      @media (prefers-color-scheme: dark) { .light-visible { display: none; } .dark-visible { display: block; } }
      .dark .light-visible { display: none; } .dark .dark-visible { display: block; }
    </style>

    <ellipse cx="200" cy="200" rx="450" ry="280" fill="url(#brandDark)" />
    <ellipse cx="1400" cy="650" rx="400" ry="250" fill="url(#brandDark)" />
    <ellipse cx="800" cy="450" rx="300" ry="350" fill="url(#brandDark)" opacity="0.4" />

    <g stroke="#818CF8" stroke-opacity="0.12" stroke-width="1">
      <line x1="0" y1="100" x2="1600" y2="100" /><line x1="0" y1="200" x2="1600" y2="200" />
      <line x1="0" y1="300" x2="1600" y2="300" /><line x1="0" y1="400" x2="1600" y2="400" />
      <line x1="0" y1="500" x2="1600" y2="500" /><line x1="0" y1="600" x2="1600" y2="600" />
      <line x1="0" y1="700" x2="1600" y2="700" /><line x1="0" y1="800" x2="1600" y2="800" />
      <line x1="200" y1="0" x2="200" y2="900" /><line x1="400" y1="0" x2="400" y2="900" />
      <line x1="600" y1="0" x2="600" y2="900" /><line x1="800" y1="0" x2="800" y2="900" />
      <line x1="1000" y1="0" x2="1000" y2="900" /><line x1="1200" y1="0" x2="1200" y2="900" />
      <line x1="1400" y1="0" x2="1400" y2="900" />
    </g>

    <g stroke="#818CF8" stroke-opacity="0.15" stroke-width="1.5" fill="none">
      <path d="M60 280 L200 280 L220 240 L260 260 L300 200 L320 220 L380 180" />
      <path d="M1220 620 L1340 620 L1360 580 L1400 600 L1440 540" />
      <path d="M60 680 L160 680 L180 640 L220 660 L260 600" />
      <path d="M1260 240 L1380 240 L1400 200 L1440 220 L1480 160" />
    </g>

    <g fill="#818CF8" fill-opacity="0.18">
      <circle cx="150" cy="150" r="3" /><circle cx="350" cy="250" r="2" />
      <circle cx="550" cy="180" r="2.5" /><circle cx="750" cy="300" r="2" />
      <circle cx="950" cy="200" r="3" /><circle cx="1150" cy="280" r="2" />
      <circle cx="1350" cy="160" r="2.5" /><circle cx="1450" cy="350" r="2" />
      <circle cx="250" cy="450" r="2" /><circle cx="450" cy="550" r="2.5" />
      <circle cx="650" cy="400" r="2" /><circle cx="850" cy="500" r="3" />
      <circle cx="1050" cy="420" r="2" /><circle cx="1250" cy="550" r="2.5" />
      <circle cx="1450" cy="480" r="2" />
    </g>
  </g>
</svg>
